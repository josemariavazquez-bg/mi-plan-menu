<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#FF9F0A">
<title>Plan de Menú y Suplementación — JM v3</title>
<style>
:root{--glass:rgba(255,255,255,.06);--glass2:rgba(255,255,255,.04);--gbd:rgba(255,255,255,.1);--bg:#000;--t:rgba(255,255,255,.92);--t2:rgba(255,255,255,.65);--t3:rgba(255,255,255,.38);--bl:#0A84FF;--bll:#60a5fa;--blb:rgba(59,130,246,.12);--rd:#FF453A;--rdb:rgba(255,69,58,.1);--yw:#FF9F0A;--ywl:#fbbf24;--ywb:rgba(255,159,10,.1);--gn:#30D158;--gnb:rgba(48,209,88,.12);--pr:#BF5AF2;--in:#5E5CE6;--inb:rgba(94,92,230,.12);--or:#FF9F0A;--orb:rgba(249,115,22,.1);--tl:#64D2FF;--r:22px;--r2:16px;--r3:12px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue','Roboto',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;margin:0;overflow-x:hidden;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;font-size:16px;line-height:1.5}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 30% 20%,rgba(10,132,255,.07) 0%,transparent 50%),radial-gradient(circle at 70% 60%,rgba(48,209,88,.05) 0%,transparent 40%),radial-gradient(circle at 50% 80%,rgba(191,90,242,.04) 0%,transparent 40%);z-index:0;pointer-events:none}
button,select{font-family:inherit;cursor:pointer;font-size:16px}
.glass{background:var(--glass);-webkit-backdrop-filter:blur(40px) saturate(180%);backdrop-filter:blur(40px) saturate(180%);border:1px solid var(--gbd);border-radius:var(--r)}
.glass2{background:var(--glass2);-webkit-backdrop-filter:blur(20px) saturate(150%);backdrop-filter:blur(20px) saturate(150%);border:1px solid rgba(255,255,255,.06);border-radius:var(--r2)}
@supports not(backdrop-filter:blur(1px)){.glass,.glass2{background:rgba(28,28,30,.93)}}

/* HEADER */
.hdr{position:sticky;top:0;z-index:40;padding:calc(env(safe-area-inset-top,0px) + 10px) 16px 14px;background:rgba(0,0,0,.72);-webkit-backdrop-filter:blur(30px) saturate(180%);backdrop-filter:blur(30px) saturate(180%)}
.hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;max-width:640px;margin-left:auto;margin-right:auto;gap:10px}
.hdr-t{font-size:15px;font-weight:700;line-height:1.3}
.hdr-t span{background:linear-gradient(135deg,var(--or),#FFD60A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-t small{display:block;font-size:11px;font-weight:400;color:var(--t3);-webkit-text-fill-color:var(--t3);background:none}
.hdr-actions{display:flex;gap:6px}
.hdr-abtn{padding:7px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);color:var(--t3);font-size:13px;font-weight:500;min-height:36px;white-space:nowrap}
.hdr-abtn:active{background:rgba(255,255,255,.1)}
.week-nav{display:flex;align-items:center;justify-content:center;gap:8px;max-width:640px;margin:0 auto}
.wn-arrow{width:48px;height:48px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);color:var(--t2);font-size:24px;display:flex;align-items:center;justify-content:center}
.wn-arrow:active{background:rgba(255,255,255,.12)}
.wn-arrow:disabled{opacity:.15}
.wn-label{min-width:130px;text-align:center;font-size:20px;font-weight:700}
.wn-label span{font-size:13px;color:var(--t3);font-weight:400;display:block;margin-top:2px}

/* TAB BAR */
.tbar{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:0 10px calc(env(safe-area-inset-bottom,0px) + 6px);pointer-events:none}
.tbar-inner{max-width:640px;margin:0 auto;display:flex;gap:3px;padding:6px 8px;border-radius:100px;background:rgba(18,18,20,.82);-webkit-backdrop-filter:blur(50px) saturate(200%);backdrop-filter:blur(50px) saturate(200%);border:1px solid rgba(255,255,255,.06);pointer-events:auto;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 2px 8px;border-radius:100px;border:none;background:transparent;color:var(--t3);font-size:11px;font-weight:500;min-height:48px;justify-content:center}
.tb.on{background:rgba(255,255,255,.1);color:var(--t)}
.tb-ic{font-size:22px;line-height:1}

/* CONTENT */
.ct{padding:10px 16px 95px;position:relative;z-index:1;max-width:640px;margin:0 auto}

/* PLANNER */
.planner{border-radius:var(--r);overflow:hidden;margin-bottom:18px}
.pl-t{font-size:13px;font-weight:600;color:var(--t2);padding:16px 16px 8px;text-transform:uppercase;letter-spacing:.06em}
.pl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 10px 12px}
.pl-scroll::-webkit-scrollbar{display:none}
.pl-grid{display:grid;grid-template-columns:48px repeat(7,68px);text-align:center;gap:0;min-width:max-content}
.pl-hd{padding:4px 2px 8px;color:var(--t3);font-size:13px;font-weight:700}
.pl-lb{text-align:right;padding:10px 8px 10px 0;color:var(--t3);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:flex-end}
.pl-c{padding:3px}
.pl-c select{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--t);font-size:15px;font-weight:600;padding:10px 2px;border-radius:12px;text-align:center;-webkit-appearance:none;appearance:none}
.pl-c select option{background:#1c1c1e;text-align:left}
.pl-c select.pila{color:var(--or)}.pl-c select.sport{color:var(--tl)}.pl-c select.dur{color:var(--gn)}
.pl-note{padding:8px 16px 14px;font-size:12px;color:var(--t3)}

/* DAY CARDS */
.dc{border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.dc-h{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;cursor:pointer;min-height:60px}
.dc-h:active{background:rgba(255,255,255,.03)}
.dc-dy{font-weight:700;font-size:18px}.dc-dy span{color:var(--t3);font-weight:400;font-size:14px;margin-left:6px}
.dc-bg{display:flex;gap:6px;align-items:center}
.badge{font-size:13px;padding:5px 12px;border-radius:100px;font-weight:600}
.badge.p1{background:rgba(48,209,88,.12);color:var(--gn)}.badge.p2{background:var(--ywb);color:var(--yw)}.badge.p3{background:var(--orb);color:var(--or)}.badge.p4{background:var(--rdb);color:var(--rd)}
.badge.bici{background:var(--blb);color:var(--bll)}.badge.gym{background:var(--rdb);color:var(--rd)}.badge.desc{background:var(--inb);color:var(--in)}
.dc-arr{color:var(--t3);font-size:16px;transition:transform .25s;margin-left:4px}.dc-arr.o{transform:rotate(180deg)}
.dc-b{display:none;padding:6px 20px 20px}.dc-b.o{display:block}

/* SECTIONS */
.st{font-size:13px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin:20px 0 12px}

/* MEAL SLOTS */
.ms{border-radius:var(--r2);padding:16px 18px;margin-bottom:10px}
.ms-top{display:flex;justify-content:space-between;align-items:center;gap:10px}
.ms-lb{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);font-weight:600}
.ms-nm{font-size:16px;color:var(--t);margin-top:3px;font-weight:500}
.ms-bt{display:flex;gap:6px}
.mb{width:44px;height:44px;border-radius:14px;border:none;display:flex;align-items:center;justify-content:center;font-size:20px}
.mb.rc{background:rgba(48,209,88,.1)}.mb.sw{background:rgba(10,132,255,.1)}
.mb:active{transform:scale(.92)}

/* RECIPE PANEL */
.rp{border-radius:var(--r2);padding:18px;margin:-4px 0 10px;border:1px solid rgba(48,209,88,.15);background:rgba(48,209,88,.04)}
.rp h4{font-size:17px;margin-bottom:10px;color:var(--gn);font-weight:700}
.rp-x{background:none;border:none;color:var(--t3);float:right;font-size:22px;padding:4px}
.rp .ri{font-size:15px;color:var(--t2);line-height:1.8}.rp .ri b{color:var(--t)}
.rp .rs{font-size:15px;color:var(--t3);margin-top:12px;line-height:1.7}.rp .rs b{color:var(--t2)}
.rp .rs ol{padding-left:22px;margin-top:6px}.rp .rs li{margin-bottom:5px}
.rp .rn{font-size:12px;color:var(--t3);margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06)}

/* PILA NOTE */
.pila-note{font-size:14px;padding:14px 18px;border-radius:var(--r2);margin-bottom:10px}
.pila-note.max{background:rgba(191,90,242,.08);color:var(--pr);border:1px solid rgba(191,90,242,.15)}

/* PILLS */
.pill{display:flex;align-items:flex-start;gap:10px;padding:10px 0}
.pill+.pill{border-top:1px solid rgba(255,255,255,.04)}
.pn{font-size:15px;font-weight:600}.pp{font-size:13px;color:var(--t3)}

/* HYDRATION */
.hy{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.hb{border-radius:var(--r3);padding:14px 16px}
.hb-l{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.hb-v{font-size:15px;color:var(--t2);margin-top:4px}
.hb-f{grid-column:1/-1}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal.op{display:flex}
.mo-s{background:rgba(28,28,30,.95);-webkit-backdrop-filter:blur(40px) saturate(180%);backdrop-filter:blur(40px) saturate(180%);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:640px;max-height:72vh;overflow-y:auto;padding:22px 18px calc(env(safe-area-inset-bottom,0px) + 26px)}
.mo-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mo-h h3{font-size:20px;font-weight:700}
.mo-x{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:var(--t2);font-size:20px;display:flex;align-items:center;justify-content:center}
.mo-o{display:block;width:100%;text-align:left;padding:16px 18px;margin-bottom:6px;border-radius:var(--r2);border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.04);color:var(--t);font-size:17px;font-weight:500;min-height:52px}
.mo-o:active{background:rgba(255,255,255,.08)}
.mo-o.cu{border:2px solid var(--bl);background:rgba(10,132,255,.08)}
.mo-o .ck{color:var(--bl);font-size:12px;margin-left:8px}
.mo-o .en{float:right;font-size:14px}

/* MENUS & RECETAS */
.mg{margin-bottom:24px}.mg h3{font-size:20px;font-weight:700;margin-bottom:14px}
.mi{border-radius:var(--r2);padding:18px 20px;margin-bottom:8px;cursor:pointer}.mi:active{background:rgba(255,255,255,.04)}
.mi-n{font-size:17px;font-weight:500}.mi-e{font-size:14px;float:right}
.rc{border-radius:var(--r2);padding:20px;margin-bottom:12px}
.rc h4{font-size:18px;font-weight:700;margin-bottom:6px}
.rc .rt{font-size:12px;padding:5px 14px;border-radius:100px;font-weight:600;display:inline-block;margin-bottom:10px}
.rc .rt.co{background:var(--ywb);color:var(--yw)}.rc .rt.ce{background:var(--inb);color:var(--in)}.rc .rt.de{background:var(--gnb);color:var(--gn)}.rc .rt.it{background:var(--rdb);color:var(--rd)}
.rc .ri{font-size:15px;color:var(--t2);line-height:1.8}.rc .ri b{color:var(--t)}
.rc .rs{font-size:15px;color:var(--t3);margin-top:10px;line-height:1.7}.rc .rs ol{padding-left:22px;margin-top:6px}.rc .rs li{margin-bottom:4px}

/* SUPPS & EQUIV */
.sc{border-radius:var(--r);padding:22px;margin-bottom:14px}
.sc-l{font-size:15px;font-weight:700;margin-bottom:12px}
.si{display:flex;gap:12px;padding:12px 0}.si+.si{border-top:1px solid rgba(255,255,255,.04)}
.sid{width:10px;height:10px;border-radius:50%;margin-top:6px;flex-shrink:0}
.sin{font-size:17px;font-weight:600}.sid2{font-size:15px;color:var(--t2)}.siw{font-size:13px;color:var(--t3)}.sii{font-size:13px;color:var(--t3);margin-top:3px}
.tw{display:flex;flex-wrap:wrap;gap:8px}
.tg{border-radius:100px;padding:7px 16px;font-size:14px;font-weight:500}
.tg.c{background:var(--ywb);border:1px solid rgba(255,159,10,.15);color:var(--ywl)}
.tg.p{background:var(--rdb);border:1px solid rgba(255,69,58,.15);color:#f87171}
.nl{font-size:15px;color:var(--t2);padding-left:20px;line-height:2}
.hidden{display:none}

/* DESKTOP */
@media(min-width:640px){
.hdr-t{font-size:18px}
.dc-dy{font-size:20px}
.ct{padding-left:28px;padding-right:28px}
}
</style>
</head>
<body>
<div class="hdr">
  <div id="saveInd" style="position:absolute;top:12px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--gn);opacity:0;transition:opacity .3s;pointer-events:none;z-index:99">💾 Guardado</div>
  <div class="hdr-row">
    <div class="hdr-t">⚡ <span>Plan de Menú y Suplementación</span><small id="appVer">José María · v3</small></div>
    <div class="hdr-actions">
      <button class="hdr-abtn" onclick="printWeek()" style="background:rgba(10,132,255,.1);color:var(--bl)">🖨️ Imprimir</button>
      <button class="hdr-abtn" onclick="addWeek()">+ Semana</button>
      <button class="hdr-abtn" onclick="if(S.totalW>1&&confirm('¿Eliminar sem '+S.totalW+'?')){delete WP[S.totalW];S.totalW--;if(S.w>S.totalW)S.w=S.totalW;save();rebuildWsel();renderPlanner();renderWeek()}">− Sem</button>
      <button class="hdr-abtn" onclick="if(confirm('¿Reset total?')){try{localStorage.removeItem('aum_wp');localStorage.removeItem('aum_s')}catch(e){}location.reload()}">Reset</button>
    </div>
  </div>
  <div class="week-nav">
    <button class="wn-arrow" id="wPrev" onclick="chgWeek(-1)">‹</button>
    <div class="wn-label" id="wLabel">Semana 1<span>de 12</span></div>
    <button class="wn-arrow" id="wNext" onclick="chgWeek(1)">›</button>
  </div>
  <select id="wSel" style="display:none"></select>
</div>
<div id="plannerW"></div>
<div class="ct"><div id="vWeek"></div><div id="vMenus" class="hidden"></div><div id="vRecetas" class="hidden"></div><div id="vSupps" class="hidden"></div><div id="vEquiv" class="hidden"></div></div>
<div class="tbar"><div class="tbar-inner" id="tabBar">
  <button class="tb on" data-v="week"><span class="tb-ic">📅</span>Semana</button>
  <button class="tb" data-v="menus"><span class="tb-ic">🍽️</span>Menús</button>
  <button class="tb" data-v="recetas"><span class="tb-ic">👨‍🍳</span>Recetas</button>
  <button class="tb" data-v="supps"><span class="tb-ic">💊</span>Suplem.</button>
  <button class="tb" data-v="equiv"><span class="tb-ic">🔄</span>Equiv.</button>
</div></div>
<div class="modal" id="modal"><div class="mo-s"><div class="mo-h"><h3 id="mT"></h3><button class="mo-x" id="mX">✕</button></div><div id="mO"></div></div></div>
<script>
const APP_V="v3",APP_DATE="14/04/2026";
const DN=["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"],DL=["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];

// ============ RECETAS COMPLETAS ============
const BF=[
{n:"Tostada jamón y AOVE",e:0,ig:"60g de pan · 10ml de AOVE · 60g de jamón · Tomate al gusto",el:"Tuesta el pan. Unta tomate rallado, añade jamón y un chorrito de AOVE."},
{n:"Tostada queso tierno",e:0,ig:"60g de pan · 30g de queso tierno · 5ml de AOVE · Tomate",el:"Tuesta el pan. Coloca lonchas de queso tierno, tomate y AOVE."},
{n:"Tostada con revuelto",e:0,ig:"60g de pan · 2 huevos L · Tomate",el:"Bate los huevos y cuájalos a fuego suave removiendo. Sirve sobre el pan tostado con tomate."}
];
const LU=[
{n:"Pasta con ternera y champiñones",e:3,
ig:"75g de pasta · 75g de ternera magra picada o a taquitos · 75g de tomate frito en AOVE · Una cebolla mediana · Champiñones y setas al gusto · Orégano",
el:"<ol><li>Cuece la pasta según las instrucciones del fabricante.</li><li>Pica la cebolla y los champiñones.</li><li>Calienta la sartén y añade las verduras, cocina a fuego medio con la ternera y la tapa puesta.</li><li>Escurre la pasta y reserva.</li><li>Añade el tomate frito en la sartén y seguidamente la pasta.</li><li>Cocina un minuto removiendo para que se mezcle todo. Espolvorea orégano y ¡listo!</li></ol>"},
{n:"Emperador con patata y verdura",e:2,
ig:"250g de emperador · 300g de patatas · Verduras al gusto",
el:"Hornea las patatas cortadas tipo panadera con las verduras. Cocina el emperador a la plancha o al horno."},
{n:"Pollo con espinacas, pasas y nueces",e:1,
ig:"120g de pechuga de pollo · 25g de pasas · 25g de nueces · 10ml de AOVE · Dos manojos de espinacas · Un diente de ajo",
el:"<ol><li>Calienta el AOVE y añade el ajo en láminas.</li><li>Añade el pollo en tiras, cocina a fuego bajo con tapa. Tuesta y reserva.</li><li>Añade espinacas y pasas, cocina hasta que reduzcan.</li><li>Pica las nueces con cuchillo.</li><li>Añade el pollo y las nueces, cocina a fuego bajo removiendo.</li></ol>"},
{n:"Hervido de patata, guisantes y huevo",e:2,
ig:"300g de patata · 2 huevos L · 150g de guisantes · 5ml de AOVE · Una zanahoria mediana · Un manojo de judías verdes · Pimienta · Sal",
el:"<ol><li>Hierve agua a fuego fuerte. Añade todos los ingredientes menos AOVE y huevos, baja a fuego medio.</li><li>Cuando estén cocidos, sácalos y reserva.</li><li>Cuece los huevos 8 minutos.</li><li>Corta verduras y patata al gusto en un plato con guisantes.</li><li>Ralla los huevos duros encima, añade AOVE, sal y pimienta. ¡Listo!</li></ol>"},
{n:"Arroz con salmón y verduras",e:3,
ig:"90g de arroz · 100g de salmón · Espárragos",
el:"<ol><li>Cuece el arroz según indicaciones.</li><li>Corta el salmón limpio en trozos y dora en sartén (sin aceite).</li><li>Añade espárragos en trozos. Cocina 2 minutos.</li><li>Incorpora el arroz y remueve. ¡Listo!</li></ol>"},
{n:"Noodles con ternera y soja",e:3,
ig:"75g de fideos de arroz · 175g de ternera magra · 50g de ketchup light · Salsa de soja · Puerro · Zanahoria · Espinacas",
el:"<ol><li>Cuece los fideos de arroz según el envase.</li><li>En sartén añade ternera a tiras o picada con las verduras, fuego bajo con tapa.</li><li>Cuando esté cocinado añade los fideos y la salsa, remueve 2 min.</li></ol><b>Salsa:</b> En un bol mezcla 50g ketchup con chorrito de soja. Repite hasta textura algo gelatinosa."},
{n:"Filete ternera con arroz y guisantes",e:3,
ig:"150g de ternera magra · 75g de arroz · 150g de guisantes · 1 cebolla mediana · 1 zanahoria mediana · Pimienta · Salsa de soja",
el:"<ol><li>Cuece el arroz según instrucciones.</li><li>Pica cebolla y zanahoria.</li><li>Cocina cebolla y zanahoria a fuego medio con tapa.</li><li>Añade guisantes, cocina 6 min a fuego medio.</li><li>Añade arroz, chorrito de soja y pimienta. Fuego bajo 2 min removiendo.</li><li>Cocina los filetes al gusto. ¡Listo!</li></ol><b>Tip:</b> Puedes marinar la ternera 12h en soja, pimienta, limón, ajo, jengibre y tomillo."},
{n:"Arroz con pollo al curry",e:3,
ig:"100g de pechuga de pollo · 100g de arroz basmati · 200ml de leche de soja · 10ml de AOVE · 15g de maicena · Una zanahoria · Media cebolla · 30g de tomate triturado · Un pimiento rojo · Curry en polvo · Pimienta",
el:"<ol><li>Calienta AOVE y cocina verduras a fuego bajo 10 min.</li><li>Cuece 100g de arroz según fabricante.</li><li>Corta pechuga en cuadritos e incorpora a la sartén.</li><li>Prepara en un vaso: leche de soja, 3 cucharadas de curry y maicena. Mezcla bien sin grumos.</li><li>Cuando el pollo esté hecho añade tomate y pimienta. Remueve 3 min a fuego bajo.</li><li>Añade la mezcla de soja+curry+maicena y deja reducir hasta textura de crema.</li><li>Sirve junto con el arroz.</li></ol>"},

let S={v:"week",w:1,oDay:-1,totalW:12};
const WP={};
function newWeek(w){const days=[];const usedLU=new Set(),usedDI=new Set();
for(let i=0;i<7;i++){const p=i<5?2:1;
const fl=pilaFilter(LU,p),fd=pilaFilter(DI,p);
let lu=0,di=0,picked=false;
for(const m of fl){const idx=LU.indexOf(m);if(!usedLU.has(idx)){lu=idx;picked=true;break}}
if(!picked&&fl.length)lu=LU.indexOf(fl[((w*7+i)*13)%fl.length]);
usedLU.add(lu);picked=false;
for(const m of fd){const idx=DI.indexOf(m);if(!usedDI.has(idx)){di=idx;picked=true;break}}
if(!picked&&fd.length)di=DI.indexOf(fd[((w*7+i)*17)%fd.length]);
usedDI.add(di);
days.push({pila:p,sp:i===0||i===2||i===4?"bici":i===1||i===3?"gym":"descanso",hr:2,bf:i%3,lu,di,rec:null,ck:{}});}
return days;}
function initWP(){for(let w=1;w<=S.totalW;w++)WP[w]=newWeek(w)}
function save(){try{localStorage.setItem("aum_wp",JSON.stringify(WP));localStorage.setItem("aum_s",JSON.stringify({w:S.w,totalW:S.totalW}));const ind=document.getElementById("saveInd");if(ind){ind.style.opacity="1";clearTimeout(ind._t);ind._t=setTimeout(()=>ind.style.opacity="0",1200)}}catch(e){}}
function load(){try{const wp=localStorage.getItem("aum_wp");const s=localStorage.getItem("aum_s");if(s){const sd=JSON.parse(s);S.w=sd.w||1;S.totalW=sd.totalW||12}if(wp){const d=JSON.parse(wp);for(let w in d){WP[w]=d[w];WP[w].forEach(day=>{if(!day.ck)day.ck={};if(!day.rec)day.rec=null})}S.totalW=Math.max(S.totalW,Object.keys(WP).length)}else{initWP()}return!!wp}catch(e){initWP();return false}}
function rebuildWsel(){const ws=$("wSel");ws.innerHTML="";for(let i=1;i<=S.totalW;i++){const o=document.createElement("option");o.value=i;o.textContent="Sem "+i;ws.appendChild(o)}ws.value=S.w;updWlabel()}
function updWlabel(){const lb=$("wLabel");if(lb)lb.innerHTML=`Semana ${S.w}<span>de ${S.totalW}</span>`;const prev=$("wPrev");const next=$("wNext");if(prev)prev.disabled=S.w<=1;if(next)next.disabled=S.w>=S.totalW}
function chgWeek(d){const nw=S.w+d;if(nw>=1&&nw<=S.totalW){S.w=nw;save();updWlabel();renderPlanner();renderWeek();if(S.v==="supps")renderSupps()}}
function addWeek(){S.totalW++;WP[S.totalW]=newWeek(S.totalW);S.w=S.totalW;save();rebuildWsel();renderPlanner();renderWeek()}
function delLastWeek(){if(S.totalW<=1)return;if(!confirm("¿Eliminar semana "+S.totalW+"?"))return;delete WP[S.totalW];S.totalW--;if(S.w>S.totalW)S.w=S.totalW;save();rebuildWsel();renderPlanner();renderWeek()}

const dots=n=>"🔋".repeat(n||0);

function betaD(w){return w<=4?"6,4g":"1,2g"}
function bicarb(w){return w<=1?"3g":w<=2?"4,5g":w<=3?"6g":"7,5g"}

function renderPlanner(){const d=WP[S.w];$("plannerW").innerHTML=`<div class="planner glass" style="margin:10px 16px"><div class="pl-t">⚙️ Configurar semana ${S.w}</div><div class="pl-scroll"><div class="pl-grid"><div class="pl-hd"></div>${DN.map(n=>`<div class="pl-hd">${n}</div>`).join("")}<div class="pl-lb">🔋</div>${d.map((_,i)=>`<div class="pl-c"><select class="pila" onchange="setPila(${i},+this.value)">${[1,2,3,4].map(v=>`<option value="${v}" ${d[i].pila===v?"selected":""}>${dots(v)}</option>`).join("")}</select></div>`).join("")}<div class="pl-lb">🏃</div>${d.map((_,i)=>`<div class="pl-c"><select class="sport" onchange="setSport(${i},this.value)">${["bici","gym","descanso"].map(v=>`<option value="${v}" ${d[i].sp===v?"selected":""}>${v==="bici"?"🚴":v==="gym"?"🏋️":"😌"}</option>`).join("")}</select></div>`).join("")}<div class="pl-lb">⏱️</div>${d.map((_,i)=>`<div class="pl-c">${d[i].sp==="bici"?`<select class="dur" onchange="setHr(${i},+this.value)">${[1,2,3,4,5,6].map(v=>`<option value="${v}" ${d[i].hr===v?"selected":""}>${v}h</option>`).join("")}</select>`:`<select class="dur" disabled style="opacity:.3"><option>—</option></select>`}</div>`).join("")}</div></div><div class="pl-note">🔋 Pila → menú · 🏃 Deporte → suplementos + hidratación</div></div>`}
function setPila(i,v){WP[S.w][i].pila=v;autoM(i);save();renderPlanner();renderWeek()}
function setSport(i,v){WP[S.w][i].sp=v;save();renderPlanner();renderWeek()}
function setHr(i,v){WP[S.w][i].hr=v;save();renderPlanner();renderWeek()}
function autoM(i){
const d=WP[S.w][i],p=d.pila;
const fl=pilaFilter(LU,p),fd=pilaFilter(DI,p);
const usedLU=new Set(),usedDI=new Set();
WP[S.w].forEach((day,j)=>{if(j!==i){usedLU.add(day.lu);usedDI.add(day.di)}});
let picked=false;
for(const m of fl){const idx=LU.indexOf(m);if(!usedLU.has(idx)){d.lu=idx;picked=true;break}}
if(!picked&&fl.length)d.lu=LU.indexOf(fl[((S.w*7+i)*13)%fl.length]);
picked=false;
for(const m of fd){const idx=DI.indexOf(m);if(!usedDI.has(idx)){d.di=idx;picked=true;break}}
if(!picked&&fd.length)d.di=DI.indexOf(fd[((S.w*7+i)*17)%fd.length]);
}
function validateMeals(){const days=WP[S.w];if(!days)return;let changed=false;
days.forEach((d,i)=>{
const vLU=pilaFilter(LU,d.pila),vDI=pilaFilter(DI,d.pila);
if(vLU.length&&!vLU.includes(LU[d.lu])){
const used=new Set();days.forEach((dy,j)=>{if(j!==i)used.add(dy.lu)});
let picked=false;for(const m of vLU){const idx=LU.indexOf(m);if(!used.has(idx)){d.lu=idx;picked=true;break}}
if(!picked)d.lu=LU.indexOf(vLU[((S.w*7+i)*13)%vLU.length]);changed=true}
if(vDI.length&&!vDI.includes(DI[d.di])){
const used=new Set();days.forEach((dy,j)=>{if(j!==i)used.add(dy.di)});
let picked=false;for(const m of vDI){const idx=DI.indexOf(m);if(!used.has(idx)){d.di=idx;picked=true;break}}
if(!picked)d.di=DI.indexOf(vDI[((S.w*7+i)*17)%vDI.length]);changed=true}
});if(changed)save()}

function renderWeek(){validateMeals();const w=S.w,days=WP[w];let h="";days.forEach((d,i)=>{const op=S.oDay===i,dn=(w-1)*7+i+1,pC=d.pila<=1?"p1":d.pila===2?"p2":d.pila===3?"p3":"p4",sC=d.sp==="bici"?"bici":d.sp==="gym"?"gym":"desc",sL=d.sp==="bici"?"🚴 "+d.hr+"h":d.sp==="gym"?"🏋️":"😌";
h+=`<div class="dc glass"><div class="dc-h" onclick="togDay(${i})"><div class="dc-dy">${DL[i]} <span>Día ${dn}</span></div><div class="dc-bg"><span class="badge ${pC}">${dots(d.pila)}</span><span class="badge ${sC}">${sL}</span><span class="dc-arr ${op?'o':''}">›</span></div></div><div class="dc-b ${op?'o':''}">`;
h+=`<div class="st">🍽️ Comidas · ${dots(d.pila)}</div>`;
h+=mS("🍳","DESAYUNO",BF[d.bf].n,i,"bf");if(d.rec==="bf")h+=rP(BF[d.bf],i);
h+=mS("🥘","COMIDA",LU[d.lu].n+" "+dots(LU[d.lu].e),i,"lu");if(d.rec==="lu")h+=rP(LU[d.lu],i);
h+=mS("🍽️","CENA",DI[d.di].n+" "+dots(DI[d.di].e),i,"di");if(d.rec==="di")h+=rP(DI[d.di],i);
h+=`<div class="ms glass2"><div class="ms-lb">🍎 MERIENDA</div><div class="ms-nm">4 piezas de fruta</div></div>`;
if(d.pila>=4)h+=`<div class="pila-note max">⚡ Pila máxima — puedes añadir pan extra o postre</div>`;
h+=`<div class="st">💊 Suplementos</div><div style="padding:0 2px">`;
h+=pill("var(--rd)","Creatina 7g","Desayuno",i,"crea");h+=pill("var(--yw)",`β-alanina ${betaD(w)}`,w<=4?`Carga sem ${w}/4`:"Mant.",i,"beta");
if(d.sp!=="descanso"){h+=pill("var(--rd)","Cafeína 200mg","45min pre",i,"cafe");h+=pill("var(--pr)","Sinefrina 60mg","45min pre",i,"sine");}
if(d.sp==="bici")h+=pill("var(--gn)","Nitratos 500-600mg","2-3h pre",i,"nitr");
if(d.sp==="gym")h+=pill("var(--bl)",`Bicarbonato ${bicarb(w)}`,`Sem ${w} pre-series`,i,"bica");
h+=pill("var(--in)","Melatonina+Mg 2caps","30-45min antes dormir",i,"mela");h+=`</div>`;
if(d.sp==="bici"){const hy=HY[Math.min(d.hr-1,5)],nIso=d.hr<=1?1:d.hr<=3?2:d.hr<=4?3:d.hr<=5?4:6;
h+=`<div class="st">💧 Hidratación bici ${d.hr}h</div>
<div class="hy">
<div class="hb glass2"><div class="hb-l" style="color:var(--bl)">PRE-ENTRENO</div><div class="hb-v">1× bidón hipotónico 500ml</div><div style="font-size:10px;color:var(--t3);margin-top:4px">📋 25g maltodextrina + 1g sal</div></div>
<div class="hb glass2"><div class="hb-l" style="color:var(--gn)">DURANTE</div><div class="hb-v">${nIso}× bidón isotónico 750ml</div><div style="font-size:10px;color:var(--t3);margin-top:4px">📋 Cada uno: 40g malto + 20g fructosa + 1g sal</div></div>
${hy.r?`<div class="hb hb-f glass2"><div class="hb-l" style="color:var(--yw)">RECOVERY</div><div class="hb-v">Batido recuperación post-entreno</div></div>`:""}
</div>
<div style="font-size:11px;color:var(--t3);margin-top:6px;padding:8px 10px;background:rgba(255,255,255,.02);border-radius:10px">🛒 <b>Preparar:</b> 1 hipotónico (25g malto + 1g sal en 500ml) + ${nIso} isotónicos (${nIso*40}g malto + ${nIso*20}g fructosa + ${nIso}g sal total)</div>`}
if(d.sp==="descanso")h+=`<div style="font-size:13px;color:var(--t3);margin-top:10px">😌 Sin suplementos pre-entreno</div>`;
h+=`</div></div>`;});$("vWeek").innerHTML=h}

function mS(ic,lb,nm,di,tp){return`<div class="ms glass2"><div class="ms-top"><div><div class="ms-lb">${ic} ${lb}</div><div class="ms-nm">${nm}</div></div><div class="ms-bt"><button class="mb rc" onclick="togRec(${di},'${tp}')">📖</button><button class="mb sw" onclick="openSw(${di},'${tp}')">↻</button></div></div></div>`}
function rP(m,di){return`<div class="rp"><button class="rp-x" onclick="togRec(${di},null)">✕</button><h4>📖 ${m.n}</h4><div class="ri"><b>Ingredientes:</b><br>${m.ig}</div><div class="rs"><b>Elaboración:</b>${m.el}</div>${m.rn?`<div class="rn">${m.rn}</div>`:""}</div>`}
function pill(c,n,p,di,k){const ck=WP[S.w][di].ck[k]||false;return`<div class="pill" style="${ck?'opacity:.5':''}"><button onclick="togCk(${di},'${k}')" style="width:24px;height:24px;border-radius:8px;border:2px solid ${ck?'var(--gn)':c};background:${ck?'var(--gn)':'transparent'};color:#fff;font-size:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center">${ck?'✓':''}</button><div style="flex:1"><div class="pn" ${ck?'style="text-decoration:line-through"':''}>${n}</div><div class="pp">${p}</div></div></div>`}
function togCk(di,k){WP[S.w][di].ck[k]=!WP[S.w][di].ck[k];save();renderWeek()}
function togDay(i){S.oDay=S.oDay===i?-1:i;renderWeek()}
function togRec(i,t){const d=WP[S.w][i];d.rec=d.rec===t?null:t;renderWeek()}

let swC=null;
function pilaFilter(meals,pila){
const f=meals.filter(m=>!m.e||(pila<=1?m.e<=1:pila===2?m.e<=2:pila===3?m.e>=2:m.e>=3));
if(f.length)return f;
const f2=meals.filter(m=>!m.e||(pila<=2?m.e<=2:m.e>=2));
return f2.length?f2:meals;
}
